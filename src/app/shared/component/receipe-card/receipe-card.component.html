
        <div class="container" *ngIf="ReceipeArr.length>0 ;else Noreceipe">
            <div class="row">
                <div class="col-md-4" *ngFor="let reciepeObj of ReceipeArr">
                    <div class="card">
                        <div class="card-header">
                            <img [src]="reciepeObj.imgUrl" [alt]="reciepeObj.imgUrl" class="img-fluid">
                        </div>

                        <div class="card-body">
                          <h4>recipeName:{{reciepeObj.recipeName}}</h4>
                          <p>Category : {{reciepeObj.category}}</p>
                          <p>Price : {{reciepeObj.price}}</p>
                          <p>Rating : {{reciepeObj.rating}}</p>
                        </div>

                        <div class="card-footer d-flex justify-content-between">
                            <button 
                            (click)="onEdit(reciepeObj)"
                            mat-mini-fab color="primary">
                                <mat-icon>edit</mat-icon>
                            </button>
                             <button
                             (click)="onRemove(reciepeObj.id)"
                             mat-mini-fab color="warn">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            </div>
            <ng-template #Noreceipe>
                <p>No receipe data Availbale</p>
            </ng-template>
